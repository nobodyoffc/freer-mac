included:
  - Packages
  - Sources
  - Tests

excluded:
  - .build
  - .swiftpm
  - DerivedData

# A deliberately small, high-signal ruleset. Expand as the codebase grows.
disabled_rules:
  - trailing_comma           # we allow trailing commas for clean diffs
  - todo                     # tracked in PLAN.md / issue tracker instead

opt_in_rules:
  - array_init
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - empty_collection_literal
  - empty_count
  - empty_string
  - fallthrough
  - first_where
  - force_unwrapping
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_random
  - literal_expression_end_indentation
  - modifier_order
  - nimble_operator
  - operator_usage_whitespace
  - overridden_super_call
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

line_length:
  warning: 140
  error: 180
  ignores_urls: true
  ignores_comments: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y
    - z

type_name:
  min_length: 3

function_body_length:
  warning: 60
  error: 120

type_body_length:
  warning: 300
  error: 500
